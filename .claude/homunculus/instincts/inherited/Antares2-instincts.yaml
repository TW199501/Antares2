# Antares2 Workflow Release Version Bump And Tag

## Action

Follow the release-version-bump-and-tag workflow:
1. Ensure on dev branch with clean working tree.
2. Bump version in package.json, src-tauri/Cargo.toml, src-tauri/Cargo.lock (antares2 entry), and src-tauri/tauri.conf.json.
3. Generate docs/release-notes-vX.Y.Z.md skeleton if not exists.
4. Pause for author to fill in release notes prose section.
5. Commit all version and release note changes.
6. Create annotated git tag vX.Y.Z.
7. Push dev branch and tag to origin.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: package.json, src-tauri/Cargo.toml, src-tauri/Cargo.lock


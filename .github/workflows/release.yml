name: Build & Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: >-
            src-tauri/target/release/bundle/nsis/*.exe,
            src-tauri/target/release/bundle/msi/*.msi
          allowUpdates: true
          draft: true
          generateReleaseNotes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-macos-x64:
    name: macOS (Intel x64)
    runs-on: macos-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download Node.js binary for macOS x64
        run: |
          NODE_VERSION=20.19.0
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" \
            | tar -xz --strip-components=2 -C sidecar/ "node-v${NODE_VERSION}-darwin-x64/bin/node"
          chmod +x sidecar/node

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: src-tauri/target/release/bundle/dmg/*.dmg
          allowUpdates: true
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm:
    name: macOS (Apple Silicon arm64)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Download Node.js binary for macOS arm64
        run: |
          NODE_VERSION=20.19.0
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-arm64.tar.gz" \
            | tar -xz --strip-components=2 -C sidecar/ "node-v${NODE_VERSION}-darwin-arm64/bin/node"
          chmod +x sidecar/node

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build --target aarch64-apple-darwin

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          allowUpdates: true
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Download Node.js binary for Linux x64
        run: |
          NODE_VERSION=20.19.0
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz" \
            | tar -xz --strip-components=2 -C sidecar/ "node-v${NODE_VERSION}-linux-x64/bin/node"
          chmod +x sidecar/node

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build

      - name: Upload to Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: >-
            src-tauri/target/release/bundle/appimage/*.AppImage,
            src-tauri/target/release/bundle/deb/*.deb,
            src-tauri/target/release/bundle/rpm/*.rpm
          allowUpdates: true
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}

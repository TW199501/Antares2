name: Build & release [STABLE]

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Exit if not on master branch
        if: contains(env.BRANCH_NAME, 'master') == false
        run: |
          echo "Wrong environment ${{env.BRANCH_NAME}}"
          exit 0

      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "src-tauri/target/release/bundle/**/*.AppImage,src-tauri/target/release/bundle/**/*.deb,src-tauri/target/release/bundle/**/*.dmg,src-tauri/target/release/bundle/**/*.exe,src-tauri/target/release/bundle/**/*.msi"
          allowUpdates: true
          draft: true
          generateReleaseNotes: true

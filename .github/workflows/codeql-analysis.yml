name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 15 * * 0'

# CodeQL uploads SARIF results via the security-events API.
# `contents: read` for checkout, `actions: read` for matrix metadata.
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # JavaScript covers TS / Vue too — CodeQL parses the .vue files
        # via its js-typescript extractor.
        language: ['javascript-typescript']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # build-mode: none is correct for JS/TS — no compile step needed,
        # extractor walks the source tree directly. Skipping the legacy
        # Autobuild step is the v3 recommendation for interpreted languages.
        build-mode: none

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"

name: Test Build [DEV]

on:
  push:
    branches:
      - dev
  workflow_dispatch: {}

jobs:
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          retention-days: 3
          path: |
            src-tauri/target/release/bundle/nsis
            src-tauri/target/release/bundle/msi

  build-macos-x64:
    name: macOS (Intel x64)
    runs-on: macos-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download Node.js binary for macOS x64
        run: |
          NODE_VERSION=20.19.0
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" \
            | tar -xz --strip-components=2 -C sidecar/ "node-v${NODE_VERSION}-darwin-x64/bin/node"
          chmod +x sidecar/node

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          retention-days: 3
          path: src-tauri/target/release/bundle/dmg

  build-macos-arm:
    name: macOS (Apple Silicon arm64)
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Download Node.js binary for macOS arm64
        run: |
          NODE_VERSION=20.19.0
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-arm64.tar.gz" \
            | tar -xz --strip-components=2 -C sidecar/ "node-v${NODE_VERSION}-darwin-arm64/bin/node"
          chmod +x sidecar/node

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build --target aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm-build
          retention-days: 3
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg

  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Download Node.js binary for Linux x64
        run: |
          NODE_VERSION=20.19.0
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz" \
            | tar -xz --strip-components=2 -C sidecar/ "node-v${NODE_VERSION}-linux-x64/bin/node"
          chmod +x sidecar/node

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm tauri:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          retention-days: 3
          path: |
            src-tauri/target/release/bundle/appimage
            src-tauri/target/release/bundle/deb
            src-tauri/target/release/bundle/rpm
